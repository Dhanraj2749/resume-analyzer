<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Resume Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; color: #333; }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; text-align: center; padding: 40px 20px;
    }
    header h1 { font-size: 2rem; }
    header p { opacity: 0.85; margin-top: 8px; }

    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

    .upload-box {
      background: white; border: 2px dashed #667eea;
      border-radius: 16px; padding: 50px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .upload-box:hover { background: #f0f4ff; }
    .upload-box input { display: none; }
    .upload-box .icon { font-size: 3rem; }
    .upload-box p { margin-top: 10px; color: #667eea; font-weight: 500; }

    .btn {
      display: block; width: 100%; margin-top: 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; padding: 14px;
      border-radius: 10px; font-size: 1rem; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loader { text-align: center; padding: 40px; display: none; }
    .spinner {
      width: 48px; height: 48px; border: 5px solid #e0e0e0;
      border-top-color: #667eea; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: none; }

    .score-card {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border-radius: 16px; padding: 30px;
      text-align: center; margin-bottom: 24px;
    }
    .score-card .score { font-size: 4rem; font-weight: 700; }
    .score-card p { opacity: 0.9; margin-top: 8px; }

    .card {
      background: white; border-radius: 16px;
      padding: 24px; margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card h3 { margin-bottom: 16px; font-size: 1.1rem; color: #444; }

    .section-scores { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .section-score label { font-size: 0.85rem; color: #666; display: block; margin-bottom: 6px; }
    .bar-bg { background: #eee; border-radius: 99px; height: 10px; }
    .bar-fill { height: 10px; border-radius: 99px; background: linear-gradient(90deg, #667eea, #764ba2); transition: width 1s ease; }

    ul { padding-left: 20px; }
    ul li { margin-bottom: 8px; line-height: 1.5; }
    .strengths li { color: #2e7d32; }
    .weaknesses li { color: #c62828; }
    .improvements li { color: #1565c0; }

    .summary { font-size: 1rem; line-height: 1.7; color: #555; }

    .error { background: #ffebee; color: #c62828; padding: 16px; border-radius: 10px; margin-top: 16px; }
  </style>
</head>
<body>

<header>
  <h1>🧠 AI Resume Analyzer</h1>
  <p>Upload your resume and get instant AI-powered feedback</p>
</header>

<div class="container">
  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <div class="icon">📄</div>
    <p id="fileLabel">Click to upload your resume (PDF)</p>
    <input type="file" id="fileInput" accept=".pdf" onchange="onFileSelect(event)" />
  </div>

  <button class="btn" id="analyzeBtn" onclick="analyzeResume()" disabled>
    Analyze Resume
  </button>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Analyzing your resume with AI...</p>
  </div>

  <div id="error"></div>

  <div class="results" id="results">
    <div class="score-card">
      <div class="score" id="overallScore">--</div>
      <p>Overall Resume Score</p>
      <p id="summary" class="summary" style="margin-top:12px;font-size:0.95rem;"></p>
    </div>

    <div class="card">
      <h3>📊 Section Scores</h3>
      <div class="section-scores" id="sectionScores"></div>
    </div>

    <div class="card">
      <h3>✅ Strengths</h3>
      <ul class="strengths" id="strengths"></ul>
    </div>

    <div class="card">
      <h3>⚠️ Weaknesses</h3>
      <ul class="weaknesses" id="weaknesses"></ul>
    </div>

    <div class="card">
      <h3>💡 Improvements</h3>
      <ul class="improvements" id="improvements"></ul>
    </div>
  </div>
</div>

<script>
  let selectedFile = null;

  function onFileSelect(event) {
    selectedFile = event.target.files[0];
    if (selectedFile) {
      document.getElementById('fileLabel').textContent = `✅ ${selectedFile.name}`;
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  async function analyzeResume() {
    if (!selectedFile) return;

    document.getElementById('loader').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    document.getElementById('error').innerHTML = '';
    document.getElementById('analyzeBtn').disabled = true;

    const formData = new FormData();
    formData.append('file', selectedFile);

    try {
      const response = await fetch('http://127.0.0.1:8000/analyze', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      if (data.error) throw new Error(data.error);
      displayResults(data);

    } catch (err) {
      document.getElementById('error').innerHTML = `<div class="error">❌ Error: ${err.message}</div>`;
    } finally {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  function displayResults(data) {
    document.getElementById('overallScore').textContent = data.overall_score + '/100';
    document.getElementById('summary').textContent = data.summary;

    const sections = data.sections;
    const sectionEl = document.getElementById('sectionScores');
    sectionEl.innerHTML = Object.entries(sections).map(([key, val]) => `
      <div>
        <label>${key.charAt(0).toUpperCase() + key.slice(1)} — ${val}/10</label>
        <div class="bar-bg"><div class="bar-fill" style="width:${val*10}%"></div></div>
      </div>
    `).join('');

    ['strengths', 'weaknesses', 'improvements'].forEach(key => {
      document.getElementById(key).innerHTML = data[key]
        .map(item => `<li>${item}</li>`).join('');
    });

    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth' });
  }
</script>

</body>
</html>
